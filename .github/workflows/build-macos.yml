name: Build macOS DMG

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      ref:
        description: '构建的分支/tag'
        required: false
        default: ''

env:
  PYTHON_VERSION: '3.12'

jobs:
  build-macos:
    name: Build macOS .dmg
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install VLC (for libvlc)
        run: brew install --cask vlc

      - name: Install FFmpeg
        run: brew install ffmpeg

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Generate app icon
        run: python scripts/generate_icon.py --output ZPlayer.icns

      - name: Build .app with PyInstaller
        run: pyinstaller ZPlayer.spec --noconfirm

      - name: Ad-hoc code sign
        run: |
          codesign --sign - --deep --force --entitlements - dist/ZPlayer.app
        continue-on-error: true

      - name: Create .dmg
        run: |
          hdiutil create \
            -volname "ZPlayer" \
            -srcfolder dist/ZPlayer.app \
            -ov -format UDZO \
            "ZPlayer-${{ github.ref_name || 'dev' }}.dmg"

      - name: Upload .dmg artifact
        uses: actions/upload-artifact@v4
        with:
          name: ZPlayer-macos
          path: ZPlayer-*.dmg
          retention-days: 30

      - name: Create Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ZPlayer-*.dmg
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
